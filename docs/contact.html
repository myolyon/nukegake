<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - nuke_gake</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-body { max-width: 640px; margin: 0 auto; padding: 32px 16px 80px; }
    .contact-body h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .contact-body p { font-size: 13px; line-height: 1.9; color: #444; margin-bottom: 24px; }
    .btn-form {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-form:hover { background: var(--primary-d); }
    .contact-note { font-size: 12px; color: var(--muted); margin-top: 16px; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none">nuke_gake</a></div>
</header>

<main class="contact-body">
  <h1>お問い合わせ</h1>
  <p>下記のボタンからGoogleフォームでお問い合わせください。<br>
     データの誤り・表示の問題・機能の要望など、お気軽にどうぞ。</p>
  <a href="mailto:info@nukegake.jp" class="btn-form">メールで問い合わせる</a>
  <p class="contact-note">通常２日以内に返信いたします。</p>
</main>

<footer class="footer">
  <a href="index.html">トップ</a>
  <span class="footer-sep">・</span>
  <a href="privacy.html">プライバシーポリシー</a>
  <span class="footer-sep">・</span>
  <a href="tokushoho.html">特定商取引法</a>
</footer>

</body>
</html>
