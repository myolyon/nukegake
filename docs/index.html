<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nukegake（ぬけがけ）- ビリだけは、嫌だ。</title>
  <meta name="description" content="地域の法人情報を検索・閲覧できる営業マン向けサービス。大阪府堺市の企業リスト。">
  <meta property="og:title" content="nukegake - ビリだけは、嫌だ。">
  <meta property="og:description" content="地域の法人情報を一括検索。個人営業マンの武器。">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">nuke<span>gake</span></a>
    <nav class="header-nav">
      <span id="plan-badge" class="plan-badge"></span>
      <a href="pricing.html" class="btn btn-sm btn-outline">料金プラン</a>
    </nav>
  </div>
</header>

<section class="hero">
  <p class="hero-catch">ビリだけは、<em>嫌だ。</em></p>
  <p class="hero-sub">地域の法人情報をまとめて検索。個人営業マンのための武器。</p>
  <div class="hero-cta">
    <a href="pricing.html" class="btn btn-primary">無制限で使う</a>
  </div>
</section>

<main class="container">

  <div class="filter-bar">
    <div class="filter-row">
      <div class="filter-group">
        <label for="filter-prefecture">都道府県</label>
        <select id="filter-prefecture">
          <option value="">すべての都道府県</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-city">市区町村</label>
        <select id="filter-city">
          <option value="">市区町村を選択</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-industry">業種</label>
        <select id="filter-industry">
          <option value="">すべての業種</option>
        </select>
      </div>
      <button id="btn-reset" class="btn btn-sm btn-outline" style="align-self:flex-end">リセット</button>
    </div>
  </div>

  <div class="result-header">
    <p class="result-count" id="result-count">-</p>
  </div>

  <div id="free-limit-msg" class="free-limit-msg" style="display:none">
    <strong>無料プランは10件まで</strong>表示できます。
    すべての企業を見るには <a href="pricing.html">有料プランへ</a>
  </div>

  <div id="ad-area" class="ad-banner">広告エリア</div>

  <div id="company-list" class="company-list">
    <div class="loading">読み込み中...</div>
  </div>

  <div id="pagination" class="pagination"></div>

</main>

<footer class="footer">
  <div class="footer-links">
    <a href="pricing.html">料金プラン</a>
    <a href="mailto:info@nukegake.jp">お問い合わせ</a>
  </div>
  <p>&copy; 2024 nukegake</p>
</footer>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
  // 有料会員バッジ表示
  if (isPaid()) {
    const b = document.getElementById('plan-badge');
    if (b) { b.textContent = '有料会員'; b.className = 'plan-badge plan-monthly'; }
  }
</script>
</body>
</html>
