<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nukegake（ぬけがけ）- ビリだけは、嫌だ。</title>
  <meta name="description" content="地域の法人情報を検索・閲覧できる営業マン向けサービス。大阪府堺市の企業リスト。">
  <meta property="og:title" content="nukegake - ビリだけは、嫌だ。">
  <meta property="og:description" content="地域の法人情報を検索・閲覧できる営業マン向けサービス。">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://nukegake.jp/">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">nuke<span>gake</span></a>
    <nav class="header-nav">
      <span id="user-info"></span>
      <span id="plan-badge" class="plan-badge"></span>
      <a href="pricing.html" class="btn btn-sm btn-outline">料金プラン</a>
      <button id="btn-login" class="btn btn-sm btn-google" style="display:none">Googleでログイン</button>
      <button id="btn-logout" class="btn btn-sm btn-outline" style="display:none">ログアウト</button>
    </nav>
  </div>
</header>

<!-- ヒーロー -->
<section class="hero">
  <p class="hero-catch">ビリだけは、<em>嫌だ。</em></p>
  <p class="hero-sub">地域の法人情報をまとめて検索。個人営業マンのための武器。</p>
  <div class="hero-cta">
    <button id="btn-login-hero" class="btn btn-primary btn-google">Googleで無料登録</button>
    <a href="pricing.html" class="btn btn-outline" style="color:#fff;border-color:#fff;">料金プランを見る</a>
  </div>
</section>

<!-- メインコンテンツ -->
<main class="container">

  <!-- フィルター -->
  <div class="filter-bar">
    <div class="filter-row">
      <div class="filter-group">
        <label for="filter-prefecture">都道府県</label>
        <select id="filter-prefecture">
          <option value="">すべての都道府県</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-city">市区町村</label>
        <select id="filter-city">
          <option value="">市区町村を選択</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-industry">業種</label>
        <select id="filter-industry">
          <option value="">すべての業種</option>
        </select>
      </div>
      <button id="btn-reset" class="btn btn-sm btn-outline" style="align-self:flex-end">リセット</button>
    </div>
  </div>

  <!-- 結果ヘッダー -->
  <div class="result-header">
    <p class="result-count"><strong id="result-count">-</strong> 件</p>
  </div>

  <!-- 無料制限メッセージ -->
  <div id="free-limit-msg" class="free-limit-msg">
    <strong>無料プランは10件まで</strong>表示できます。
    すべての企業情報を見るには
    <a href="pricing.html">有料プラン</a>にアップグレードしてください。
  </div>

  <!-- 広告（無料ユーザーのみ表示、JS側で制御） -->
  <div id="ad-area" class="ad-banner">広告エリア</div>

  <!-- 企業一覧 -->
  <div id="company-list" class="company-list">
    <div class="loading">読み込み中...</div>
  </div>

  <!-- ページネーション -->
  <div id="pagination" class="pagination"></div>

</main>

<!-- フッター -->
<footer class="footer">
  <div class="footer-links">
    <a href="pricing.html">料金プラン</a>
    <a href="mailto:info@nukegake.jp">お問い合わせ</a>
    <a href="#">特定商取引法に基づく表示</a>
    <a href="#">プライバシーポリシー</a>
    <a href="#">利用規約</a>
  </div>
  <p>&copy; 2024 nukegake</p>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- アプリ -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

<script>
  // ヒーローのログインボタン
  document.getElementById('btn-login-hero')?.addEventListener('click', signInWithGoogle);

  // ログイン状態に応じて広告を制御
  const origOnUserChange = onUserChange;
  window._onUserChange = function(user) {
    const adArea = document.getElementById('ad-area');
    if (adArea) adArea.style.display = (user && isPaidUser()) ? 'none' : 'block';
  };
</script>

</body>
</html>
